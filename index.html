<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e-สารบรรณโรงเรียน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Prompt:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<!-- Supabase JS v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d2342;--navy-mid:#163457;--navy-light:#1e4a7a;
  --gold:#c9a84c;--gold-light:#e2c06a;--gold-pale:#fdf6e3;
  --white:#ffffff;--gray-50:#f8fafc;--gray-100:#f1f5f9;
  --gray-200:#e2e8f0;--gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;
  --text-1:#1e293b;--text-2:#475569;--text-3:#94a3b8;
  --blue:#2563eb;--blue-bg:#eff6ff;--green:#16a34a;--green-bg:#f0fdf4;
  --orange:#ea580c;--orange-bg:#fff7ed;--red:#dc2626;--red-bg:#fef2f2;
  --amber:#d97706;--amber-bg:#fffbeb;--purple:#7c3aed;--purple-bg:#f5f3ff;
  --sidebar-w:260px;--topbar-h:64px;--radius:10px;--radius-lg:16px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow:0 4px 16px rgba(0,0,0,.10);--shadow-lg:0 8px 32px rgba(0,0,0,.14);
}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:'Sarabun',sans-serif;background:var(--gray-50);color:var(--text-1);min-height:100vh;line-height:1.6}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:99px}
#loading-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:9999;transition:opacity .5s}
#loading-screen.hide{opacity:0;pointer-events:none}
.loading-logo{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--navy);animation:pulse 1.5s ease-in-out infinite}
.loading-text{color:var(--white);font-family:'Prompt',sans-serif;font-size:15px;font-weight:500;opacity:.85}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(201,168,76,.4)}50%{transform:scale(1.05);box-shadow:0 0 0 12px rgba(201,168,76,0)}}
html,body{height:100%}
#app{min-height:100vh;display:flex;flex-direction:column}
.layout{display:flex;flex:1;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--navy);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:200;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sidebar-brand{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-brand-logo{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--navy);margin-bottom:10px}
.sidebar-brand-name{font-family:'Prompt',sans-serif;font-size:14px;font-weight:700;color:var(--white);line-height:1.3}
.sidebar-brand-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;line-height:1.4}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0}
.sidebar-section{padding:8px 20px 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:rgba(255,255,255,.65);transition:all .2s;font-size:13.5px;position:relative;margin:1px 8px;border-radius:8px}
.nav-item:hover{background:rgba(255,255,255,.07);color:var(--white)}
.nav-item.active{background:linear-gradient(90deg,rgba(201,168,76,.2),rgba(201,168,76,.08));color:var(--gold-light);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--gold);border-radius:0 3px 3px 0;margin-left:-8px}
.nav-icon{width:18px;text-align:center;font-size:14px}
.sidebar-user{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sidebar-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--navy);flex-shrink:0}
.sidebar-user-name{font-size:12.5px;font-weight:600;color:var(--white);line-height:1.2}
.sidebar-user-role{font-size:11px;color:rgba(255,255,255,.4)}
.btn-logout{margin-left:auto;background:rgba(255,255,255,.07);border:none;color:rgba(255,255,255,.5);width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s}
.btn-logout:hover{background:rgba(220,38,38,.3);color:var(--white)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:190}
.sidebar-overlay.show{display:block}
.main-content{margin-left:var(--sidebar-w);display:flex;flex-direction:column;min-height:100vh;flex:1}
.topbar{height:var(--topbar-h);background:var(--white);border-bottom:1px solid var(--gray-200);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);flex-shrink:0}
.btn-menu{display:none;background:none;border:none;font-size:18px;color:var(--text-2);cursor:pointer;padding:6px;border-radius:8px}
.topbar-title{font-family:'Prompt',sans-serif;font-size:16px;font-weight:700;color:var(--navy);line-height:1.2}
.topbar-sub{font-size:12px;color:var(--text-3);margin-top:1px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-icon{width:36px;height:36px;border-radius:8px;background:var(--gray-100);border:none;cursor:pointer;color:var(--text-2);font-size:15px;transition:all .2s;display:flex;align-items:center;justify-content:center;position:relative}
.btn-icon:hover{background:var(--gray-200);color:var(--text-1)}
.notif-badge{position:absolute;top:-3px;right:-3px;width:16px;height:16px;background:var(--red);border-radius:50%;font-size:9px;color:var(--white);display:flex;align-items:center;justify-content:center;font-weight:700}
.page-content{padding:24px;flex:1;background:var(--gray-50)}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--white);border-radius:var(--radius-lg);padding:18px 20px;border:1px solid var(--gray-100);display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-card.highlight{border-left:4px solid var(--gold)}
.stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.stat-icon.blue{background:var(--blue-bg);color:var(--blue)}
.stat-icon.green{background:var(--green-bg);color:var(--green)}
.stat-icon.orange{background:var(--orange-bg);color:var(--orange)}
.stat-icon.amber{background:var(--amber-bg);color:var(--amber)}
.stat-icon.purple{background:var(--purple-bg);color:var(--purple)}
.stat-value{font-family:'Prompt',sans-serif;font-size:26px;font-weight:800;color:var(--navy);line-height:1}
.stat-label{font-size:12px;color:var(--text-3);margin-top:3px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.table-wrap{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--gray-100);overflow:hidden}
.table-toolbar{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--gray-100);flex-wrap:wrap}
.search-box{position:relative;flex:1;min-width:200px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:13px}
.search-box input{width:100%;padding:8px 12px 8px 32px;border:1.5px solid var(--gray-200);border-radius:8px;font-family:'Sarabun',sans-serif;font-size:13px;outline:none;transition:border .2s;background:var(--gray-50)}
.search-box input:focus{border-color:var(--navy);background:var(--white)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--gray-50);padding:10px 12px;text-align:left;font-weight:700;color:var(--text-2);border-bottom:2px solid var(--gray-200);white-space:nowrap;font-size:12px;letter-spacing:.02em}
tbody tr{border-bottom:1px solid var(--gray-100);transition:background .15s}
tbody tr:hover{background:var(--gray-50)}
tbody tr:last-child{border-bottom:none}
tbody td{padding:10px 12px;color:var(--text-1);vertical-align:middle}
.btn-icon-act{width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s}
.btn-icon-act.blue{background:var(--blue-bg);color:var(--blue)}.btn-icon-act.blue:hover{background:var(--blue);color:var(--white)}
.btn-icon-act.green{background:var(--green-bg);color:var(--green)}.btn-icon-act.green:hover{background:var(--green);color:var(--white)}
.btn-icon-act.red{background:var(--red-bg);color:var(--red)}.btn-icon-act.red:hover{background:var(--red);color:var(--white)}
.btn-icon-act.tg{background:#e8f4fb;color:#229ED9}.btn-icon-act.tg:hover{background:#229ED9;color:var(--white)}
.pagination{display:flex;align-items:center;gap:4px;padding:12px 16px;border-top:1px solid var(--gray-100);flex-wrap:wrap}
.page-btn{min-width:32px;height:32px;border-radius:6px;border:1.5px solid var(--gray-200);background:var(--white);cursor:pointer;font-family:'Sarabun',sans-serif;font-size:12px;color:var(--text-2);display:inline-flex;align-items:center;justify-content:center;transition:all .15s;padding:0 8px}
.page-btn:hover:not(:disabled){border-color:var(--navy);color:var(--navy)}
.page-btn.active{background:var(--navy);color:var(--white);border-color:var(--navy)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.page-info{font-size:12px;color:var(--text-3);margin-left:auto}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap;gap:3px}
.badge-blue{background:var(--blue-bg);color:var(--blue)}.badge-green{background:var(--green-bg);color:var(--green)}
.badge-orange{background:var(--orange-bg);color:var(--orange)}.badge-red{background:var(--red-bg);color:var(--red)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}.badge-gray{background:var(--gray-100);color:var(--gray-500)}
.badge-navy{background:rgba(13,35,66,.1);color:var(--navy)}.badge-purple{background:var(--purple-bg);color:var(--purple)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);animation:slideUp .25s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:center;gap:10px;padding:18px 20px;border-bottom:1px solid var(--gray-100)}
.modal-icon{width:36px;height:36px;border-radius:10px;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:15px}
.modal-title{font-family:'Prompt',sans-serif;font-size:15px;font-weight:700;color:var(--navy);flex:1}
.modal-close{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:16px;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:var(--gray-100);color:var(--text-1)}
.modal-body{overflow-y:auto;padding:20px;flex:1}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--gray-100)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12.5px;font-weight:600;color:var(--text-2)}
.form-control{padding:9px 12px;border:1.5px solid var(--gray-200);border-radius:8px;font-family:'Sarabun',sans-serif;font-size:13.5px;outline:none;transition:border .2s;color:var(--text-1);background:var(--white)}
.form-control:focus{border-color:var(--navy)}
select.form-control{cursor:pointer}
textarea.form-control{resize:vertical;min-height:80px}
.form-control:disabled{background:var(--gray-50);color:var(--text-3);cursor:not-allowed}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.alert-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(220,38,38,.2)}
.alert-success{background:var(--green-bg);color:var(--green);border:1px solid rgba(22,163,74,.2)}
.alert-info{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(37,99,235,.2)}
.card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--gray-100);overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--gray-100)}
.card-title{font-family:'Prompt',sans-serif;font-size:14px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:8px}
.card-body{padding:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:13.5px;font-weight:600;transition:all .2s;white-space:nowrap}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-primary{background:var(--blue);color:var(--white)}.btn-primary:hover:not(:disabled){background:#1d4ed8;transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.3)}
.btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover:not(:disabled){background:var(--gold-light);transform:translateY(-1px)}
.btn-success{background:var(--green);color:var(--white)}.btn-success:hover:not(:disabled){background:#15803d}
.btn-danger{background:var(--red);color:var(--white)}.btn-danger:hover:not(:disabled){background:#b91c1c}
.btn-outline{background:transparent;border:1.5px solid var(--gray-300);color:var(--text-2)}.btn-outline:hover:not(:disabled){border-color:var(--navy);color:var(--navy)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-drive{background:#1a73e8;color:#fff;gap:6px}.btn-drive:hover:not(:disabled){background:#1557b0}
.toast-wrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--white);border-radius:10px;padding:12px 16px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;font-size:13px;min-width:240px;max-width:340px;border-left:4px solid var(--blue);animation:toastIn .3s cubic-bezier(.4,0,.2,1)}
.toast.success{border-left-color:var(--green)}.toast.error{border-left-color:var(--red)}.toast.info{border-left-color:var(--gold)}
.toast-icon{font-size:16px}.toast.success .toast-icon{color:var(--green)}.toast.error .toast-icon{color:var(--red)}.toast.info .toast-icon{color:var(--gold)}
@keyframes toastIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:var(--white);border-radius:50%;animation:spin .7s linear infinite}
.spinner.dark{border:2.5px solid var(--gray-200);border-top-color:var(--navy)}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:48px 20px}
.empty-state i{font-size:48px;color:var(--gray-300);display:block;margin-bottom:14px}
.empty-state h4{font-family:'Prompt',sans-serif;font-size:16px;font-weight:700;color:var(--text-2);margin-bottom:6px}
.empty-state p{font-size:13px;color:var(--text-3);margin-bottom:16px}
.login-page{min-height:100vh;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 40%,#0f3460 100%);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.login-card{background:var(--white);border-radius:20px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.3);position:relative;z-index:1}
.login-logo-wrap{text-align:center;margin-bottom:28px}
.login-logo-circle{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--navy-light));display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--gold);margin:0 auto 14px}
.login-title{font-family:'Prompt',sans-serif;font-size:17px;font-weight:800;color:var(--navy)}
.login-school{font-size:12.5px;color:var(--text-3);margin-top:4px}
.login-divider{height:1px;background:var(--gray-100);margin:4px 0 20px}
.login-page .form-control{padding:11px 12px 11px 38px}
.input-wrap{position:relative}
.input-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:14px;pointer-events:none}
.btn-login{width:100%;padding:12px;background:linear-gradient(90deg,var(--navy),var(--navy-light));color:var(--white);border:none;border-radius:10px;font-family:'Prompt',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.btn-login:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(13,35,66,.4)}
.btn-login:disabled{opacity:.7;cursor:not-allowed}
.tabs{display:flex;gap:4px;padding:4px;background:var(--gray-100);border-radius:10px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text-3);transition:all .2s;font-weight:500}
.tab.active{background:var(--white);color:var(--navy);font-weight:700;box-shadow:var(--shadow-sm)}
.tab:hover:not(.active){color:var(--text-2)}
.fade-in{animation:fadeInUp .3s ease}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.confirm-box{text-align:center;padding:12px 0}
.confirm-emoji{font-size:40px;margin-bottom:12px}
.confirm-title{font-family:'Prompt',sans-serif;font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px}
.confirm-msg{font-size:13px;color:var(--text-3)}
.notif-panel{position:fixed;top:72px;right:16px;width:320px;background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);border:1px solid var(--gray-100);z-index:300;overflow:hidden;animation:slideUp .2s}
.notif-panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--gray-100);background:var(--gray-50)}
.notif-panel-title{font-family:'Prompt',sans-serif;font-size:13px;font-weight:700;color:var(--navy)}
.notif-panel-action{font-size:12px;color:var(--blue);cursor:pointer}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--gray-100);transition:background .15s}
.notif-item:hover{background:var(--gray-50)}
.notif-text{font-size:13px;color:var(--text-1)}
.notif-time{font-size:11px;color:var(--text-3);margin-top:3px}
.welcome-banner{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);border-radius:var(--radius-lg);padding:24px 28px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;position:relative;overflow:hidden}
.welcome-banner h2{font-family:'Prompt',sans-serif;font-size:20px;font-weight:700;color:var(--white);margin-bottom:4px}
.welcome-banner h2 span{color:var(--gold-light)}
.welcome-banner p{font-size:13px;color:rgba(255,255,255,.6)}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.file-drop{border:2px dashed var(--gray-300);border-radius:10px;padding:16px;text-align:center;cursor:pointer;color:var(--text-3);font-size:13px;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.file-drop:hover,.file-drop.drag{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.file-preview{display:flex;align-items:center;gap:8px;background:var(--blue-bg);padding:8px 12px;border-radius:8px;margin-top:8px}
.file-name{font-size:12px;flex:1;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

// GOOGLE DRIVE PICKER

const GDrive = {
  tokenClient: null,
  accessToken: null,
  pickerInited: false,
  gapiInited: false,
  _resolve: null,

  init(){
    if(CONFIG.google_client_id==='YOUR_GOOGLE_CLIENT_ID') return;
    gapi.load('picker', ()=>{ GDrive.pickerInited=true; });
  },

  async getToken(){
    return new Promise((resolve)=>{
      if(GDrive.accessToken){ resolve(GDrive.accessToken); return; }
      const client=google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.google_client_id,
        scope: 'https://www.googleapis.com/auth/drive.readonly',
        callback:(resp)=>{ GDrive.accessToken=resp.access_token; resolve(resp.access_token); },
      });
      client.requestAccessToken({prompt:'consent'});
    });
  },

  async openPicker(){
    if(CONFIG.google_client_id==='YOUR_GOOGLE_CLIENT_ID'){
      UI.toast('กรุณาตั้งค่า Google Client ID ก่อน','error'); return null;
    }
    const token = await GDrive.getToken();
    return new Promise((resolve)=>{
      GDrive._resolve = resolve;
      const picker = new google.picker.PickerBuilder()
        .addView(new google.picker.DocsView()
          .setIncludeFolders(false)
          .setMimeTypes('application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,image/jpeg,image/png'))
        .addView(new google.picker.DocsView(google.picker.ViewId.DOCS))
        .setOAuthToken(token)
        .setDeveloperKey(CONFIG.google_api_key)
        .setTitle('เลือกไฟล์จาก Google Drive')
        .setCallback((data)=>{
          if(data.action===google.picker.Action.PICKED){
            const f=data.docs[0];
            resolve({
              id: f.id,
              name: f.name,
              url: `https://drive.google.com/file/d/${f.id}/view`,
              mimeType: f.mimeType,
            });
          } else if(data.action===google.picker.Action.CANCEL){
            resolve(null);
          }
        }).build();
      picker.setVisible(true);
    });
  },
};

  toggleYearMenu(){

    const btn=document.getElementById('btn-year-sw');

    const rect=btn.getBoundingClientRect();
    const curYear=new Date().getFullYear()+543;
    const years=[curYear+1,curYear,curYear-1,curYear-2];
    const menu=document.createElement('div');
    menu.id='year-menu';
    menu.style.cssText=`position:fixed;top:${rect.bottom+6}px;right:${window.innerWidth-rect.right}px;background:var(--white);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.15);border:1px solid var(--gray-200);z-index:400;overflow:hidden;min-width:160px`;

      years.map(y=>`<div onclick="App.switchYear(${y})" style="padding:10px 14px;cursor:pointer;font-size:13px;font-weight:${y===State.activeYear?'700':'500'};color:${y===State.activeYear?'var(--navy)':'var(--text-2)'};background:${y===State.activeYear?'var(--gold-pale)':'transparent'};display:flex;align-items:center;justify-content:space-between">

        ${y===State.activeYear?'<i class="fas fa-check" style="color:var(--green);font-size:11px"></i>':''}

    document.body.appendChild(menu);

  async _saveInc(id){
    const g=el=>document.getElementById(el)?.value.trim()||'';
    const title=g('f-title'); if(!title){UI.toast('กรุณาระบุเรื่อง','error');return;}
    const row={
      year:State.activeYear,receive_no:g('f-rno'),book_no:g('f-bno'),
      date_received:g('f-date'),title,department:g('f-dept'),
      responsible:g('f-resp'),urgent:g('f-urgent'),status:g('f-status'),note:g('f-note'),
    };
    if(App._selectedDriveFile){
      row.file_url=App._selectedDriveFile.url;
      row.file_name=App._selectedDriveFile.name;
      row.file_drive_id=App._selectedDriveFile.id;
      row.attach_type='drive';
    }
    if(id){
      const{error}=await DB.updateIncoming(id,row);
      if(error){UI.toast('เกิดข้อผิดพลาด: '+error.message,'error');return;}
      await DB.addLog('update_incoming',`แก้ไขหนังสือรับ: ${row.receive_no}`);
    } else {
      const{error}=await DB.insertIncoming({...row,created_by:State.user?.id});
      if(error){UI.toast('เกิดข้อผิดพลาด: '+error.message,'error');return;}
      await DB.addLog('create_incoming',`ลงทะเบียนหนังสือรับ: ${row.receive_no}`);
    }
    UI.closeModal();UI.toast('บันทึกสำเร็จ','success');
    App._incCache=[];App._selectedDriveFile=null;
    await App._renderIncStats();await App._renderIncTable();
  },

  async _changeStatus(table,id,current){

    UI.showModal('เปลี่ยนสถานะ',`<div style="display:grid;gap:8px">${(opts[table]||[]).map(s=>`<button class="btn ${s===current?'btn-primary':'btn-outline'}" onclick="App._doChangeStatus('${table}','${id}','${s}')">${s}</button>`).join('')}</div>`,`<button class="btn btn-outline" onclick="UI.closeModal()">ยกเลิก</button>`,'fa-exchange-alt');

  async _doChangeStatus(table,id,status){
    const fns={incoming:DB.updateIncoming,outgoing:DB.updateOutgoing,memos:DB.updateMemo,orders:DB.updateOrder};

    UI.closeModal();UI.toast('เปลี่ยนสถานะสำเร็จ','success');

  async _saveReserveGeneric(type,no){

    const resp=g('f-res-resp');
    const note=g('f-res-note');
    const dateVal=g('f-res-date');
    let row={year:State.activeYear,reserved:true,title,status:'ร่าง'};
    const inserts={
      outgoing:()=>DB.insertOutgoing({...row,send_no:no,to_department:'',urgent:'ปกติ',signer:resp,date_sent:dateVal,created_by:State.user?.id}),
      memos:()=>DB.insertMemo({...row,memo_no:no,to_person:resp,created_at:dateVal,created_by:State.user?.id}),
      orders:()=>DB.insertOrder({...row,order_no:no,effective_date:dateVal,created_by:State.user?.id}),
    };
    if(inserts[type]) await inserts[type]();
    App._notifyTelegram('reserve',{no,title});

    UI.closeModal();UI.toast(`จองเลข ${no} เรียบร้อย 🔖`,'success');

  async _switchRegTab(type){
    App._regType=type;App._regPage=1;

      t.classList.toggle('active',['incoming','outgoing','memos','orders'][i]===type);
    });
    await App._renderRegTable();
  },
  async _renderRegTable(){
    const type=App._regType,yr=State.activeYear;
    const q=(document.getElementById('reg-search')?.value||'').toLowerCase();
    const titles={incoming:'ทะเบียนหนังสือรับ',outgoing:'ทะเบียนหนังสือส่ง',memos:'ทะเบียนบันทึกข้อความ',orders:'ทะเบียนคำสั่ง'};
    const colors={incoming:'var(--blue)',outgoing:'var(--green)',memos:'var(--amber)',orders:'var(--purple)'};
    const icons={incoming:'fa-inbox',outgoing:'fa-paper-plane',memos:'fa-sticky-note',orders:'fa-clipboard-list'};
    const noKey={incoming:'receive_no',outgoing:'send_no',memos:'memo_no',orders:'order_no'}[type];
    const titleEl=document.getElementById('reg-title');
    if(titleEl) titleEl.innerHTML=`<i class="fas ${icons[type]}" style="color:${colors[type]}"></i> ${titles[type]} — พ.ศ. ${yr}`;
    const loaders={incoming:DB.getIncoming,outgoing:DB.getOutgoing,memos:DB.getMemos,orders:DB.getOrders};
    let data=await loaders[type](yr);
    if(q) data=data.filter(d=>Object.values(d).join(' ').toLowerCase().includes(q));
    data=[...data].sort((a,b)=>extractSeq(a[noKey])-extractSeq(b[noKey]));
    App._regCache=data;
    const pp=20,page=App._regPage,total=Math.ceil(data.length/pp)||1;
    const rows=data.slice((page-1)*pp,page*pp);
    document.getElementById('reg-table-wrap').innerHTML=data.length===0
      ?`<div style="padding:40px;text-align:center;color:var(--text-3)"><i class="fas ${icons[type]}" style="font-size:32px;opacity:.2;display:block;margin-bottom:8px"></i>ไม่มีข้อมูล</div>`
      :`<div style="overflow-x:auto">${App._regTableHtml(type,rows,(page-1)*pp)}</div>`;
    const pgEl=document.getElementById('reg-pagination');

  async _printRegister(){
    const type=App._regType,yr=State.activeYear;
    const sc=State.schoolConfig;
    const titles={incoming:'ทะเบียนหนังสือรับ',outgoing:'ทะเบียนหนังสือส่ง',memos:'ทะเบียนบันทึกข้อความ',orders:'ทะเบียนคำสั่ง'};
    const colors={incoming:'#2563eb',outgoing:'#16a34a',memos:'#d97706',orders:'#7c3aed'};
    const noKey={incoming:'receive_no',outgoing:'send_no',memos:'memo_no',orders:'order_no'}[type];
    const loaders={incoming:DB.getIncoming,outgoing:DB.getOutgoing,memos:DB.getMemos,orders:DB.getOrders};
    let data=await loaders[type](yr);
    data=[...data].sort((a,b)=>extractSeq(a[noKey])-extractSeq(b[noKey]));
    const now=new Date(),printDate=`${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getFullYear()+543}`;
    const logoHtml=sc.logo_url?`<img src="${sc.logo_url}" style="width:60px;height:60px;object-fit:contain;margin-right:12px">`:`<div style="width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#c9a84c,#e2c06a);display:flex;align-items:center;justify-content:center;font-size:24px;margin-right:12px;flex-shrink:0">🏫</div>`;
    const header=`<div style="display:flex;align-items:center;justify-content:center;margin-bottom:8px">${logoHtml}<div style="text-align:center"><div style="font-family:'Sarabun',sans-serif;font-size:16pt;font-weight:800;color:#0d2342">${sc.school_name||'โรงเรียน'}</div>${sc.under_org?`<div style="font-size:10pt;color:#64748b;margin-top:2px">${sc.under_org}</div>`:''}</div></div><div style="text-align:center;margin-bottom:4px"><span style="display:inline-block;background:${colors[type]};color:#fff;font-family:'Sarabun',sans-serif;font-size:13pt;font-weight:800;padding:5px 24px;border-radius:20px">${titles[type]} — ประจำปี พ.ศ. ${yr}</span></div><div style="text-align:right;font-size:9pt;color:#94a3b8;margin-bottom:8px">พิมพ์วันที่ ${printDate} | จำนวน ${data.length} รายการ</div><hr style="border:none;border-top:2px solid ${colors[type]};margin-bottom:10px">`;
    const chunkSize=28;
    const chunks=[];
    for(let i=0;i<Math.max(1,data.length);i+=chunkSize) chunks.push(data.slice(i,i+chunkSize));
    const pages=chunks.map((chunk,ci)=>`<div class="print-page" style="font-family:'Sarabun',sans-serif;padding:0">${header}${App._regTableHtml(type,chunk,ci*chunkSize)}<div style="margin-top:6px;font-size:8pt;color:#94a3b8;text-align:center">หน้า ${ci+1} / ${chunks.length}</div></div>`).join('');
    const win=window.open('','_blank','width=1100,height=800');
    win.document.write(`<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><title>${titles[type]} ${yr}</title><link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Sarabun',sans-serif;background:#fff;color:#1e293b;font-size:9.5pt}@page{size:A4 landscape;margin:12mm 10mm}.print-page{page-break-after:always;padding-bottom:4mm}.print-page:last-child{page-break-after:auto}table{width:100%;border-collapse:collapse;font-size:8.5pt}thead th{background:${colors[type]}22;color:#1e293b;padding:6px 8px;text-align:left;font-weight:700;border:1px solid ${colors[type]}44;white-space:nowrap;font-size:8pt}tbody td{padding:5px 8px;border:1px solid #e2e8f0;vertical-align:middle;line-height:1.4}tbody tr:nth-child(even){background:#f8fafc}.badge{display:inline-block;padding:2px 7px;border-radius:99px;font-size:7.5pt;font-weight:700}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body>${pages}<script>window.onload=function(){setTimeout(function(){window.print();},400);};<\/script></body></html>`);
    win.document.close();
    UI.toast(`กำลังเปิด PDF ${titles[type]} 📄`,'success');
  },

  _toggleTgTokenVisibility(){
    const inp=document.getElementById('tg-token'),eye=document.getElementById('tg-eye');
    if(!inp||!eye)return;
    const h=inp.type==='password';
    inp.type=h?'text':'password';
    eye.innerHTML=`<i class="fas fa-eye${h?'-slash':''}"></i>`;
  },

  _saveTelegramSettings(){
    const token=document.getElementById('tg-token')?.value.trim();
    const chatId=document.getElementById('tg-chatid')?.value.trim();
    if(document.getElementById('tg-enabled')?.checked&&(!token||!chatId)){UI.toast('กรุณากรอก Bot Token และ Chat ID','error');return;}
    const cfg={
      enabled:document.getElementById('tg-enabled')?.checked||false,token,chatId,
      schoolName:document.getElementById('tg-school')?.value.trim()||State.schoolConfig.school_name||'โรงเรียน',
      notif_incoming:document.getElementById('notif_incoming')?.checked||false,
      notif_outgoing:document.getElementById('notif_outgoing')?.checked||false,
      notif_memo:document.getElementById('notif_memo')?.checked||false,
      notif_order:document.getElementById('notif_order')?.checked||false,
      notif_status:document.getElementById('notif_status')?.checked||false,
      notif_reserve:document.getElementById('notif_reserve')?.checked||false,
    };
    App._saveTgConfig(cfg);
    UI.toast('บันทึกการตั้งค่า Telegram สำเร็จ','success');
    DB.addLog('update_telegram','บันทึกการตั้งค่าแจ้งเตือน Telegram');
  },

  async _testTelegram(){
    const btn=document.getElementById('btn-tg-test'),res=document.getElementById('tg-test-result');
    const token=document.getElementById('tg-token')?.value.trim();
    const chatId=document.getElementById('tg-chatid')?.value.trim();
    if(!token||!chatId){res.innerHTML='<span style="color:var(--red)"><i class="fas fa-times-circle"></i> กรุณากรอก Token และ Chat ID ก่อน</span>';return;}
    btn.disabled=true;btn.innerHTML='<div class="spinner" style="border-top-color:#229ED9;border-color:rgba(34,158,217,.2)"></div> กำลังส่ง...';res.innerHTML='';
    const school=document.getElementById('tg-school')?.value.trim()||'โรงเรียน';
    const ok=await App._sendTgMsg(token,chatId,`🏫 *${school}*\n✅ ทดสอบระบบแจ้งเตือน Telegram สำเร็จ!\n\n_e-สารบรรณโรงเรียน พร้อมใช้งานแล้ว_`);
    btn.disabled=false;
    btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="#229ED9"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-2.04 9.607c-.15.703-.55.875-1.115.545l-3.08-2.27-1.486 1.43c-.165.165-.302.302-.618.302l.22-3.123 5.677-5.127c.247-.22-.054-.341-.384-.121L6.4 14.578l-3.024-.946c-.657-.206-.671-.657.137-.972l11.81-4.555c.547-.198 1.026.133.84.143h-.601z"/></svg> ส่งข้อความทดสอบ`;
    res.innerHTML=ok?'<span style="color:var(--green)"><i class="fas fa-check-circle"></i> ส่งสำเร็จ!</span>':'<span style="color:var(--red)"><i class="fas fa-times-circle"></i> ส่งไม่สำเร็จ — ตรวจสอบ Token/Chat ID</span>';
  },

  async _sendTgMsg(token,chatId,text){
    try{
      const r=await fetch(`https://api.telegram.org/bot${token}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:chatId,text,parse_mode:'Markdown',disable_web_page_preview:true})});
      const d=await r.json();return d.ok===true;
    }catch(e){return false;}
  },

  _tgAttachLine(d){
    if(!d.file_url)return '';
    const icon=d.attach_type==='link'?'🔗':'📎';
    return `\n${icon} *${d.attach_type==='link'?'ลิงก์แนบ':'ไฟล์แนบ'}:* [${d.file_name||d.file_url}](${d.file_url})`;
  },

  _manualNotify(type,id){
    const cfg=App._getTgConfig();
    if(!cfg.token||!cfg.chatId){
      UI.showModal('ตั้งค่า Telegram ก่อน',`<div style="text-align:center;padding:16px 0"><div style="font-size:40px;margin-bottom:12px">⚙️</div><p style="font-size:13px;color:var(--text-2)">ยังไม่ได้ตั้งค่า Bot Token และ Chat ID<br>กรุณาไปที่ <strong>ตั้งค่า → แจ้งเตือน Telegram</strong> ก่อน</p></div>`,`<button class="btn btn-outline" onclick="UI.closeModal()">ปิด</button><button class="btn btn-primary" onclick="UI.closeModal();App.navigate('settings')"><i class="fas fa-cog"></i> ไปตั้งค่า</button>`,'fa-cog');
      return;
    }
    const caches={incoming:App._incCache,outgoing:App._outCache,memos:App._memCache,orders:App._ordCache};
    const doc=(caches[type]||[]).find(d=>d.id===id);
    if(!doc){UI.toast('ไม่พบเอกสาร','error');return;}
    const school=cfg.schoolName||State.schoolConfig.school_name||'โรงเรียน';
    const yr=State.activeYear;
    const attach=App._tgAttachLine(doc);
    const msgMap={
      incoming:[`📥 *มีหนังสือรับ*`,`🏫 ${school}`,``,`📋 *เลขรับ:* ${doc.receive_no}`,`📄 *เรื่อง:* ${doc.title}`,`🏢 *จาก:* ${doc.department||'-'}`,`👤 *ผู้รับผิดชอบ:* ${doc.responsible||'-'}`,`⚡ *ชั้นความเร็ว:* ${doc.urgent||'ปกติ'}`,`🔖 *สถานะ:* ${doc.status}`,`📅 *วันที่รับ:* ${doc.date_received||'-'}`,`📆 *ประจำปี:* พ.ศ. ${yr}`,attach,``,`_แจ้งเตือนจาก e-สารบรรณโรงเรียน_`],
      outgoing:[`📤 *หนังสือส่ง*`,`🏫 ${school}`,``,`📋 *เลขที่:* ${doc.send_no}`,`📄 *เรื่อง:* ${doc.title}`,`🏢 *ถึง:* ${doc.to_department||'-'}`,`✍️ *ผู้ลงนาม:* ${doc.signer||'-'}`,`🔖 *สถานะ:* ${doc.status}`,`📆 *ประจำปี:* พ.ศ. ${yr}`,attach,``,`_e-สารบรรณโรงเรียน_`],
      memos:[`📝 *บันทึกข้อความ*`,`🏫 ${school}`,``,`📋 *เลขที่:* ${doc.memo_no||'-'}`,`📄 *เรื่อง:* ${doc.title}`,`👤 *ถึง:* ${doc.to_person||'-'}`,`🔖 *สถานะ:* ${doc.status}`,`📆 *ประจำปี:* พ.ศ. ${yr}`,attach,``,`_e-สารบรรณโรงเรียน_`],
      orders:[`📋 *คำสั่ง*`,`🏫 ${school}`,``,`📋 *เลขที่:* ${doc.order_no}`,`📄 *เรื่อง:* ${doc.title}`,`📅 *วันที่มีผล:* ${doc.effective_date||'-'}`,`🔖 *สถานะ:* ${doc.status||'-'}`,`📆 *ประจำปี:* พ.ศ. ${yr}`,``,`_e-สารบรรณโรงเรียน_`],
    };
    const lines=(msgMap[type]||[]).filter(l=>l!==undefined);
    const msgText=lines.join('\n');
    const previewHtml=lines.map(l=>{
      if(!l)return '<div style="height:5px"></div>';
      const clean=l.replace(/\*/g,'').replace(/^_|_$/g,'');
      if(/^(📥|📤|📝|📋 \*คำ)/.test(l))return `<div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:3px">${clean}</div>`;
      if(l.startsWith('🏫'))return `<div style="font-size:12px;color:var(--text-3);margin-bottom:8px">${clean}</div>`;
      if(l.startsWith('_'))return `<div style="font-size:11px;color:var(--text-3);font-style:italic;margin-top:4px">${clean}</div>`;
      return `<div style="font-size:13px;color:var(--text-2);padding:1px 0">${clean}</div>`;
    }).join('');
    App._pendingTgMsg=msgText;
    UI.showModal('ส่งแจ้งเตือนผ่าน Telegram',`
      <div style="font-size:12px;color:var(--text-3);margin-bottom:10px">ตัวอย่างข้อความที่จะส่งไปยัง <strong style="color:#229ED9">Telegram</strong>:</div>
      <div style="background:#ebf6ff;border:1.5px solid #229ED9;border-radius:12px;padding:16px 18px;margin-bottom:14px">${previewHtml}</div>
      <div style="font-size:12px;color:var(--text-3)"><i class="fas fa-paper-plane" style="color:#229ED9"></i> Chat ID: <code style="background:var(--gray-100);padding:1px 6px;border-radius:4px">${cfg.chatId}</code></div>
      <div id="manual-tg-result" style="margin-top:10px;font-size:12px"></div>`,`
      <button class="btn btn-outline" onclick="UI.closeModal()">ยกเลิก</button>
      <button class="btn" id="btn-manual-tg-send" onclick="App._doManualNotify('${type}','${id}')" style="background:#229ED9;color:var(--white)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-2.04 9.607c-.15.703-.55.875-1.115.545l-3.08-2.27-1.486 1.43c-.165.165-.302.302-.618.302l.22-3.123 5.677-5.127c.247-.22-.054-.341-.384-.121L6.4 14.578l-3.024-.946c-.657-.206-.671-.657.137-.972l11.81-4.555c.547-.198 1.026.133.84.143h-.601z"/></svg>
        ส่งแจ้งเตือน
      </button>`,'fab fa-telegram-plane');
  },

  _pendingTgMsg:'',
  async _doManualNotify(type,id){
    const cfg=App._getTgConfig();
    const btn=document.getElementById('btn-manual-tg-send'),res=document.getElementById('manual-tg-result');
    if(!btn||!res)return;
    btn.disabled=true;btn.innerHTML='<div class="spinner"></div> กำลังส่ง...';
    const ok=await App._sendTgMsg(cfg.token,cfg.chatId,App._pendingTgMsg);
    if(ok){
      res.innerHTML='<span style="color:var(--green)"><i class="fas fa-check-circle"></i> ส่งสำเร็จ!</span>';
      btn.style.background='var(--green)';btn.innerHTML='<i class="fas fa-check"></i> ส่งแล้ว';
      DB.addLog('telegram_notify',`ส่งแจ้งเตือน Telegram: ${type} id=${id}`);
      setTimeout(()=>UI.closeModal(),1800);
    } else {
      res.innerHTML='<span style="color:var(--red)"><i class="fas fa-times-circle"></i> ส่งไม่สำเร็จ — ตรวจสอบ Token/Chat ID</span>';
      btn.disabled=false;btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-2.04 9.607c-.15.703-.55.875-1.115.545l-3.08-2.27-1.486 1.43c-.165.165-.302.302-.618.302l.22-3.123 5.677-5.127c.247-.22-.054-.341-.384-.121L6.4 14.578l-3.024-.946c-.657-.206-.671-.657.137-.972l11.81-4.555c.547-.198 1.026.133.84.143h-.601z"/></svg> ลองใหม่';
    }
  },

  async _notifyTelegram(event,docData){
    const cfg=App._getTgConfig();
    if(!cfg.enabled||!cfg.token||!cfg.chatId)return;
    const school=cfg.schoolName||State.schoolConfig.school_name||'โรงเรียน';
    const yr=State.activeYear;
    const attach=App._tgAttachLine(docData||{});
    let msg='';
    if(event==='incoming'&&cfg.notif_incoming)
      msg=`📥 *มีหนังสือรับใหม่*\n🏫 ${school}\n\n📋 *เลขรับ:* ${docData.receive_no}\n📄 *เรื่อง:* ${docData.title}\n🏢 *จาก:* ${docData.department||'-'}\n👤 *ผู้รับผิดชอบ:* ${docData.responsible||'-'}\n⚡ *ชั้นความเร็ว:* ${docData.urgent||'ปกติ'}\n📅 *วันที่รับ:* ${docData.date_received||'-'}\n📆 *ประจำปี:* พ.ศ. ${yr}${attach}\n\n_แจ้งเตือนจาก e-สารบรรณโรงเรียน_`;
    else if(event==='outgoing'&&cfg.notif_outgoing)
      msg=`📤 *มีหนังสือส่งใหม่*\n🏫 ${school}\n\n📋 *เลขที่:* ${docData.send_no}\n📄 *เรื่อง:* ${docData.title}\n🏢 *ถึง:* ${docData.to_department||'-'}\n📆 *ประจำปี:* พ.ศ. ${yr}${attach}\n\n_e-สารบรรณโรงเรียน_`;
    else if(event==='memo'&&cfg.notif_memo)
      msg=`📝 *มีบันทึกข้อความใหม่*\n🏫 ${school}\n\n📋 *เลขที่:* ${docData.memo_no||'-'}\n📄 *เรื่อง:* ${docData.title}\n👤 *ถึง:* ${docData.to_person||'-'}\n📆 *ประจำปี:* พ.ศ. ${yr}${attach}\n\n_e-สารบรรณโรงเรียน_`;
    else if(event==='order'&&cfg.notif_order)
      msg=`📋 *มีคำสั่งใหม่*\n🏫 ${school}\n\n📋 *เลขที่:* ${docData.order_no}\n📄 *เรื่อง:* ${docData.title}\n📆 *ประจำปี:* พ.ศ. ${yr}${attach}\n\n_e-สารบรรณโรงเรียน_`;
    else if(event==='status'&&cfg.notif_status)
      msg=`🔄 *เปลี่ยนสถานะเอกสาร*\n🏫 ${school}\n\n📋 *เลขที่:* ${docData.no}\n📄 *เรื่อง:* ${docData.title}\n🔁 *สถานะใหม่:* ${docData.newStatus}\n\n_e-สารบรรณโรงเรียน_`;
    else if(event==='reserve'&&cfg.notif_reserve)
      msg=`🔖 *มีการจองเลขใหม่*\n🏫 ${school}\n\n📋 *เลขที่จอง:* ${docData.no}\n📄 *เรื่อง:* ${docData.title||'-'}\n📆 *ประจำปี:* พ.ศ. ${yr}\n\n_e-สารบรรณโรงเรียน_`;
    if(msg) await App._sendTgMsg(cfg.token,cfg.chatId,msg);
  },

    document.getElementById('set-content').innerHTML=`
      <div class="table-wrap">
        <div class="table-toolbar">
          <div class="card-title"><i class="fas fa-users" style="color:var(--navy)"></i> ผู้ใช้งาน (${users.length})</div>
          <div style="flex:1"></div>
          <button class="btn btn-primary" onclick="App._showUserForm()"><i class="fas fa-user-plus"></i> เพิ่มผู้ใช้</button>
        </div>
        <div style="overflow-x:auto"><table>
          <thead><tr><th>#</th><th>ชื่อ-สกุล</th><th>Username</th><th>บทบาท</th><th>สังกัด</th><th>สถานะ</th><th>จัดการ</th></tr></thead>
          <tbody>${users.map((u,i)=>`<tr>
            <td>${i+1}</td>
            <td><strong>${u.fullname}</strong></td>
            <td><code style="background:var(--gray-100);padding:2px 6px;border-radius:4px;font-size:12px">${u.username}</code></td>
            <td>${UI.roleBadge(u.role)}</td>
            <td style="font-size:12px">${u.department||'-'}</td>
            <td><span class="badge ${u.status==='active'?'badge-green':'badge-red'}">${u.status==='active'?'ใช้งาน':'ระงับ'}</span></td>
            <td>
              <button class="btn-icon-act blue" onclick="App._showUserForm('${u.id}')" title="แก้ไข"><i class="fas fa-edit"></i></button>
              ${u.id!==State.user?.id?`<button class="btn-icon-act red" onclick="App._deleteUser('${u.id}')" title="ลบ" style="margin-left:4px"><i class="fas fa-trash"></i></button>`:''}
            </td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>`;
  },
  _showUserForm(id){
    const isEdit=!!id;
    UI.showModal(isEdit?'แก้ไขผู้ใช้':'เพิ่มผู้ใช้ใหม่',`
      <div class="form-grid">
        <div class="form-group full"><label class="form-label">ชื่อ-สกุล *</label><input class="form-control" id="f-uname" placeholder="ชื่อ-สกุล"></div>
        <div class="form-group"><label class="form-label">Username ${isEdit?'':'*'}</label><input class="form-control" id="f-uuser" ${isEdit?'disabled':''} placeholder="username"></div>
        <div class="form-group"><label class="form-label">${isEdit?'รหัสผ่านใหม่ (เว้นว่างถ้าไม่เปลี่ยน)':'รหัสผ่าน *'}</label><input type="password" class="form-control" id="f-upass" placeholder="รหัสผ่าน"></div>
        <div class="form-group"><label class="form-label">บทบาท</label>
          <select class="form-control" id="f-urole">
            <option value="teacher">ครู</option><option value="staff">ธุรการ</option>
            <option value="director">ผอ.</option><option value="admin">ผู้ดูแลระบบ</option>
          </select></div>
        <div class="form-group"><label class="form-label">สังกัด</label><input class="form-control" id="f-udept" placeholder="ฝ่าย / กลุ่มงาน"></div>
        ${isEdit?`<div class="form-group"><label class="form-label">สถานะ</label><select class="form-control" id="f-usta"><option value="active">ใช้งาน</option><option value="inactive">ระงับ</option></select></div>`:''}
      </div>`,`
      <button class="btn btn-outline" onclick="UI.closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="App._saveUser('${id||''}')"><i class="fas fa-save"></i> บันทึก</button>`,'fa-user');
  },
  async _saveUser(id){
    const g=el=>document.getElementById(el)?.value.trim()||'';
    const fullname=g('f-uname');if(!fullname){UI.toast('กรุณาระบุชื่อ','error');return;}
    if(id){
      const row={fullname,role:g('f-urole'),department:g('f-udept'),status:g('f-usta')||'active'};
      const pass=g('f-upass');if(pass) row.password=pass;
      await DB.updateUser(id,row);
    } else {
      const username=g('f-uuser'),password=g('f-upass');
      if(!username||!password){UI.toast('กรุณากรอกให้ครบ','error');return;}
      await DB.insertUser({username,password,fullname,role:g('f-urole'),department:g('f-udept'),status:'active'});
    }
    UI.closeModal();UI.toast('บันทึกสำเร็จ','success');await App._loadUsers();
  },
  async _deleteUser(id){
    if(!await UI.confirm('ลบผู้ใช้','ยืนยันลบผู้ใช้งานออกจากระบบ?','🗑️'))return;
    await DB.deleteUser(id);UI.toast('ลบผู้ใช้เรียบร้อย','success');await App._loadUsers();
  },

  async _loadLogs(){
    const logs=await DB.getLogs();
    document.getElementById('set-content').innerHTML=`
      <div class="table-wrap">
        <div class="table-toolbar"><div class="card-title"><i class="fas fa-history" style="color:var(--orange)"></i> ประวัติการใช้งาน (${logs.length} รายการ)</div></div>
        <div style="overflow-x:auto"><table>
          <thead><tr><th>เวลา</th><th>ผู้ใช้</th><th>การกระทำ</th><th>รายละเอียด</th></tr></thead>
          <tbody>${logs.slice(0,100).map(l=>`<tr>
            <td style="white-space:nowrap;font-size:12px">${new Date(l.created_at).toLocaleString('th-TH')}</td>
            <td style="font-size:12px">${l.user_name||'-'}</td>
            <td><span class="badge ${l.action.includes('create')?'badge-green':l.action.includes('delete')?'badge-red':l.action==='login'?'badge-blue':'badge-gray'}">${l.action}</span></td>
            <td style="font-size:13px">${l.detail||''}</td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>`;
  },
};

// BOOT
window.addEventListener('DOMContentLoaded',()=>App.init());
</script>
</body>
</html>
